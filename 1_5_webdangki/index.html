<!doctype html>
<html>
<head>
<meta charset="utf-8">
<title> Trang đăng ký</title>
</head>

<body>
<table width="1000" border="0" align="center" cellpadding="0" cellspacing="0">
  <tbody>
    <tr>
      <td background="Images/logo_bg.gif" width="767"><img src="Images/lachong.gif" width="162" height="80" alt=""/></td>
      <td width="217" align="right"><img src="Images/Flash.gif" width="67" height="80" alt=""/><img src="Images/dreamweaver.gif" width="72" height="80" alt=""/><img src="Images/adobe.gif" width="74" height="80" alt=""/></td>
    </tr>
    <tr>
      <td height="431" colspan="2" valign="top"><hr color="#FF0004" width="500px">
        <form id="form1" name="form1" method="post"><table width="100%" border="0" cellpadding="0" cellspacing="0">
        <tbody>
          <tr>
            <td height="70" colspan="2" align="center" valign="middle" style="font-size: 24px; font-family: 'Gill Sans', 'Gill Sans MT', 'Myriad Pro', 'DejaVu Sans Condensed', Helvetica, Arial, sans-serif;"><strong>PHIẾU ĐĂNG KÝ</strong></td>
            </tr>
          <tr>
            <td width="39%" align="right">Họ và tên:</td>
            <td width="61%"><input name="textfield" type="text" id="textfield" size="30" required>
              (*)</td>
          </tr>
          <tr>
            <td align="right" valign="middle">Địa chỉ :</td>
            <td><input name="txtdiachi" type="text" id="txtdiachi" size="60"></td>
          </tr>
          <tr>
            <td align="right" valign="middle">Email : </td>
            <td><input type="text" name="txtmail" id="txtmail" required>
              (*)</td>
          </tr>
          <tr>
            <td align="right" valign="middle">Giới tính : </td>
            <td><input type="radio" name="radio" id="radio" value="radio">
              Nam 
                <label for="radio">
                  <input type="radio" name="radio" id="radio2" value="radio">
                  Nữ
                </label></td>
          </tr>
          <tr>
            <td align="right" valign="middle">Tuổi : </td>
            <td><input type="text" name="txttuoi" id="txttuoi" required>
              (*)</td>
          </tr>
          <tr>
            <td height="152" align="right" valign="middle">Sở thích : </td>
            <td><input type="checkbox" name="thethao" id="thethao">
              <label for="thethao">Thể thao<br>
                <input type="checkbox" name="thethao2" id="thethao2">
                Văn học<br>
                <input type="checkbox" name="thethao3" id="thethao3">
                Công nghệ thông tin<br>
                <input type="checkbox" name="thethao4" id="thethao4">
                Lịch sử<br>
                <input type="checkbox" name="thethao5" id="thethao5">
              </label>
              Game</td>
          </tr>
          <tr>
            <td align="right" valign="middle">Chuyên ngành : </td>
            <td><select name="select" id="select">
              <option>Công nghệ Web</option>
              <option>Quản trị mạng</option>
              <option>Thiết kế Web</option>
            </select></td>
          </tr>
          <tr>
            <td align="right" valign="middle">Gởi hình : </td>
            <td><input type="file" name="fileField" id="fileField"></td>
          </tr>
          <tr>
            <td height="91" align="right" valign="middle">Yêu cầu : </td>
            <td><textarea name="textarea" cols="50" rows="5" id="textarea"></textarea></td>
          </tr>
          <tr>
            <td height="26" align="right" valign="middle">&nbsp;</td>
            <td><input name="submit" type="submit" id="submit" formmethod="POST" value="Gửi thông tin">
              <input type="reset" name="reset" id="reset" value="Nhập lại"></td>
          </tr>
        </tbody>
      </table>
      </form></td>
    </tr>
  </tbody>
</table>
</body>
</html>
